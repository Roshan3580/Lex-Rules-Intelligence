# Curated seed list of official state tax sources used by /api/ingest/run.
#
# Each entry is fetched, cleaned, chunked, and run through rule extraction.
# Already-ingested sources are skipped via SHA-256 checksum.
#
# Add more entries here as you onboard new states. Prefer authoritative
# state-government domains (.gov, .ca.gov, etc).

